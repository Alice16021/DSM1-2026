<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="estilo.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-green bg-sucess">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">
          <i class="bi bi-house-door-fill"></i>
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="index.html"
                >Home</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="produtos.html">Sobre Nós</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="contato.html">Login</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container mt-3">
      <h3>Gostariámos de tê-lo com a gente.</h3>
      <h4> Cadastre-se!</h4>
      <form class="row g-3">
        <!--Nome-->
        <div class="col-md-7 col-sm-12">
          <div class="form-floating">
            <input
              type="text"
              name="nome"
              id="nome"
              class="form-control"
              placeholder="Nome completo"
              required
            />
            <label for="nome">Nome completo</label>
          </div>
        </div>
        <!--E-mail-->
        <div class="col-md-5 col-sm-12">
          <div class="form-floating">
            <input
              type="email"
              name="email"
              id="email"
              class="form-control"
              placeholder="E-mail"
              required
            />
            <label for="email">E-mail</label>
          </div>
        </div>

        <!--Senha-->
        <div class="col-md-4 col-sm-12">
          <div class="form-floating">
            <input
              type="password"
              name="senha"
              id="senha"
              class="form-control"
              placeholder="Senha"
              required
            />
            <label for="senha">Senha</label>
          </div>
        </div>

        <!--Data de Nascimento-->
        <div class="col-md-4 col-sm-12">
          <div class="form-floating">
            <input type="date" name="data" id="data" class="form-control" />
            <label for="data">Data de nascimento</label>
          </div>
        </div>

        <div class="col-md-4 col-sm-12">
          <div class="form-floating">
            <select
              name="categoria"
              id="categoria"
              class="form-select"
              required
            >
              <option value="" selected disabled>Selecione</option>
              <option value="Feminino">Feminino</option>
              <option value="Masculino">Masculino</option>
              <option value="Outro">Outro</option>
            </select>
            <label for="Genero">Gênero</label>
          </div>
        </div>

        <div class="col-md-4 col-sm-12">
          <label class="form-label d-block">Gostaria de receber em primeira mão nossas promoções?</label>
          <div class="form-check form-check-inline">
            <input
              type="radio"
              name="tipo"
              id="afirmativo"
              class="form-check-input"
            />
            <label for="afirmativo" class="form-check-label">Sim, eu gostaria!</label>
          </div>
          <div class="form-check form-check-inline">
            <input
              type="radio"
              name="tipo"
              id="negativo"
              class="form-check-input"
            />
            <label for="negativo" class="form-check-label">Não, obrigado!</label>
          </div>
        </div>

        <div class="col-md-12 col-sm-12">
          <div class="form-check">
            <input
              type="checkbox"
              name="termos"
              id="termos"
              class="form-check-input"
              required
            />
            <label for="termos" class="form-check-label">
              Aceite os termos
            </label>
          </div>
        </div>

        <div class="col-12 mb-4">
          <button type="submit" class="btn btn-success">Enviar</button>
          <button type="reset" class="btn btn-warning">Limpar</button>
          <button type="button" class="btn btn-danger">Cancelar</button>
        </div>
      </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
